<!DOCTYPE html>
<html>

<head>
    <title>Portfolio Optimizer</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename = 'icons/favicon.ico')}}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">


</head>

<body>
    <div class="header-container">
        <div class="header-content">
            <img src="{{ url_for('static', filename='images/s-l1200.jpg') }}" alt="Turtle">
            <div class="header-text">
                <h1>Portfolio Optimizer</h1>
                <p> Welcome to my portfolio optimizer</p>
            </div>
        </div>
    </div>

    <!-- Stock Information -->
    <br>
    <label>Stock Ticker:</label>
    <input id="stocktick"><br><br>
    <button id="mySubmit">Submit</button>
    <button id="myReset">Reset</button>
    <button id="myAdd">Add</button>

    <div id="errormessage"></div>

    <p id="textplaceholder"></p>
    <div id="stockInfo">
        <h3 style="font-family: ''Monaco', monospace;'">Stock Information:</h3>
        <p>Name: <span id="stockName"></span></p>
        <p>Current Price: <span id="stockPrice"></span></p>
        <p> Market Cap: <span id="marketCap"></span></p>
        <p>P/E Ratio: <span id="peRatio"></span></p>
        <p>Volume: <span id="volume"></span></p>
        <button onclick="getStockNews(document.getElementById('stocktick').value)" class=news-btn>View News</button>
    </div>

    <!-- News Section -->
    <div id="newsSection">
        <h3 style="font-weight:bold">Current News for <span id="newsSymbol"></span></h3>
        <div id="newsFeed">
            <button onclick="hideNews()" class="close-btn">Close News</button>
        </div>
    </div>
    <!-- price graph-->
    <div id="graphSection">
        <div id="plotgraph"></div>
    </div>



    <script src="{{ url_for('static', filename='js/app.js')}}"></script>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
</body>

</html>
