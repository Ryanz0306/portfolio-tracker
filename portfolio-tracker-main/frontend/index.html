<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Optimizer</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename = 'icons/favicon.ico')}}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 7H6v10h7V7z M17 7v10m0-10h-4" />
                </svg>
                <span>Portfolio Optimizer</span>
            </div>
            <div class="nav-links">
                <a href="/" class="nav-link active">Dashboard</a>
                <a href="/portfolio" class="nav-link">Portfolio</a>
                <a href="/analytics" class="nav-link">Analytics</a>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Simple Portfolio Optimizer </h1>
            <p>Utilize Markowitz, CAPM, and factor model optimization tools</p>
        </div>
    </section>

    <!-- Main Content -->
    <main class="container">
        <!-- Search Section -->
        <section class="search-section">
            <div class="search-card">
                <h2>Search Stocks</h2>
                <div class="search-container">
                    <input type="text" id="stocktick" class="stock-input"
                        placeholder="Enter stock ticker (e.g., AAPL, GOOGL)" autocomplete="off">
                    <button id="mySubmit" class="btn btn-primary">
                        <span>Search</span>
                        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <circle cx="11" cy="11" r="8" />
                            <path d="m21 21-4.35-4.35" />
                        </svg>
                    </button>
                </div>
                <div id="errormessage" class="error-message"></div>
                <div class="button-group">
                    <button id="myReset" class="btn btn-secondary">Reset</button>
                    <button id="myAdd" class="btn btn-accent">Add to Portfolio</button>
                </div>
            </div>
        </section>

        <!-- Stock Info Section -->
        <section id="stockInfoSection" class="stock-section" style="display: none;">
            <div class="info-grid">
                <div class="info-card">
                    <div class="info-item">
                        <label class="info-label">Company Name</label>
                        <p class="info-value" id="stockName">-</p>
                    </div>
                </div>
                <div class="info-card">
                    <div class="info-item">
                        <label class="info-label">Current Price</label>
                        <p class="info-value price" id="stockPrice">-</p>
                    </div>
                </div>
                <div class="info-card">
                    <div class="info-item">
                        <label class="info-label">Market Cap</label>
                        <p class="info-value" id="marketCap">-</p>
                    </div>
                </div>
                <div class="info-card">
                    <div class="info-item">
                        <label class="info-label">P/E Ratio</label>
                        <p class="info-value" id="peRatio">-</p>
                    </div>
                </div>
                <div class="info-card">
                    <div class="info-item">
                        <label class="info-label">Volume</label>
                        <p class="info-value" id="volume">-</p>
                    </div>
                </div>
                <div class="info-card">
                    <div class="info-item">
                        <label class="info-label">Previous Close</label>
                        <p class="info-value" id="previousClose">-</p>
                    </div>
                </div>
                <div class="info-card">
                    <div class="info-item">
                        <label class="info-label">Day High</label>
                        <p class="info-value" id="dayHigh">-</p>
                    </div>
                </div>
                <div class="info-card">
                    <div class="info-item">
                        <label class="info-label">Day Low</label>
                        <p class="info-value" id="dayLow">-</p>
                    </div>
                </div>
            </div>

            <div id="graphSection" class="chart-section" style="display: none; margin-top: 2rem;">
                <div class="chart-card">
                    <h2>Price History</h2>
                    <div id="plotgraph" class="chart-container"></div>
                </div>
            </div>
        </section>

        <!-- News Section -->
        <section id="newsSection" class="news-section" style="display: none;">
            <div class="news-card">
                <div class="news-header">
                    <h2>Latest News for <span id="newsSymbol"></span></h2>
                    <button onclick="hideNews()" class="btn-close">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path
                                d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41z" />
                        </svg>
                    </button>
                </div>
                <div id="newsFeed" class="news-feed">
                    <!-- News articles will be inserted here -->
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; Mini project made by Ryan Z.</p>
    </footer>

    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js')}}"></script>
</body>

</html>
